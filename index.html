                                        ))}
                                        {adminList.length === 0 && (
                                            <p className="text-center text-slate-400 text-sm py-4 italic">Tiada admin direkodkan.</p>
                                        )}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* ========================================================= */}
                    {/* MODAL JANA & MUAT TURUN LAPORAN PDF */}
                    {/* ========================================================= */}
                    {showReportModal && (
                        <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-[100] p-4 backdrop-blur-sm">
                            <div className="bg-white rounded-xl shadow-2xl w-full max-w-md overflow-hidden fade-in border border-gray-100">
                                <div className="bg-emerald-600 px-5 py-4 text-white flex justify-between items-center">
                                    <div className="flex items-center gap-2">
                                        <i data-lucide="file-down" className="w-5 h-5 text-emerald-100"></i>
                                        <h3 className="font-bold text-lg">Muat Turun Laporan</h3>
                                    </div>
                                    <button onClick={() => setShowReportModal(false)} className="text-emerald-100 hover:text-white"><i data-lucide="x" className="w-5 h-5"></i></button>
                                </div>
                                
                                <form onSubmit={generateAndSendReport} className="p-6">
                                    {reportSuccess ? (
                                        <div className="bg-green-50 border border-green-200 text-green-700 p-4 rounded-lg text-center font-medium">
                                            <i data-lucide="check-circle" className="w-8 h-8 mx-auto mb-2 text-green-500"></i>
                                            {reportSuccess}
                                        </div>
                                    ) : (
                                        <>
                                            <p className="text-sm text-gray-600 mb-5">Pilih kandungan untuk laporan PDF anda. Laporan akan terus dimuat turun (download) ke dalam peranti anda.</p>

                                            <div className="mb-6 bg-gray-50 p-4 rounded-lg border border-gray-100">
                                                <label className="block text-sm font-bold text-gray-700 mb-3">Pilih Kandungan Laporan:</label>
                                                <div className="space-y-2.5">
                                                    <label className="flex items-center gap-3 cursor-pointer">
                                                        <input type="checkbox" className="w-4 h-4 text-emerald-600 rounded focus:ring-emerald-500" checked={reportSelections.timeline} onChange={(e) => setReportSelections({...reportSelections, timeline: e.target.checked})} />
                                                        <span className="text-sm text-gray-700">Carta Sukuan Tahun</span>
                                                    </label>
                                                    <label className="flex items-center gap-3 cursor-pointer">
                                                        <input type="checkbox" className="w-4 h-4 text-emerald-600 rounded focus:ring-emerald-500" checked={reportSelections.eisenhower} onChange={(e) => setReportSelections({...reportSelections, eisenhower: e.target.checked})} />
                                                        <span className="text-sm text-gray-700">Carta Matriks Kepentingan</span>
                                                    </label>
                                                    <label className="flex items-center gap-3 cursor-pointer">
                                                        <input type="checkbox" className="w-4 h-4 text-emerald-600 rounded focus:ring-emerald-500" checked={reportSelections.department} onChange={(e) => setReportSelections({...reportSelections, department: e.target.checked})} />
                                                        <span className="text-sm text-gray-700">Projek Mengikut Sektor</span>
                                                    </label>
                                                    <label className="flex items-center gap-3 cursor-pointer">
                                                        <input type="checkbox" className="w-4 h-4 text-emerald-600 rounded focus:ring-emerald-500" checked={reportSelections.completed} onChange={(e) => setReportSelections({...reportSelections, completed: e.target.checked})} />
                                                        <span className="text-sm text-gray-700">Projek Lengkap</span>
                                                    </label>
                                                </div>
                                            </div>

                                            <div className="flex gap-3">
                                                <button type="button" onClick={() => setShowReportModal(false)} className="flex-1 px-4 py-2.5 bg-white border border-gray-300 text-gray-700 rounded-md hover:bg-gray-50 font-medium transition-colors text-sm">Batal</button>
                                                <button 
                                                    type="submit" 
                                                    disabled={isGeneratingReport || (!reportSelections.timeline && !reportSelections.eisenhower && !reportSelections.department && !reportSelections.completed)} 
                                                    className={`flex-1 px-4 py-2.5 rounded-md font-medium flex justify-center items-center gap-2 transition-colors text-sm shadow-sm bg-emerald-600 text-white hover:bg-emerald-700 disabled:opacity-70`}
                                                >
                                                    {isGeneratingReport ? <><i data-lucide="refresh-cw" className="w-4 h-4 animate-spin"></i> Menjana...</> : 'Muat Turun PDF'}
                                                </button>
                                            </div>
                                        </>
                                    )}
                                </form>
                            </div>
                        </div>
                    )}

                    {/* MODAL TAMBAH/KEMASKINI PROJEK */}
                    {showModal && (
                        <div className="fixed inset-0 bg-black/50 flex items-start justify-center z-[100] p-4 pt-20 md:pt-24">
                            <div className="bg-white rounded-xl shadow-xl w-full max-w-md overflow-hidden fade-in">
                                <div className="flex justify-between items-center p-4 border-b border-gray-100 bg-gray-50">
                                    <h3 className="font-bold text-lg text-gray-800">{isEditing ? 'Maklumat Projek' : 'Tambah Projek Baru'}</h3>
                                    <button onClick={() => setShowModal(false)} className="text-gray-400 hover:text-gray-600"><i data-lucide="x" className="w-5 h-5"></i></button>
                                </div>
                                
                                <form onSubmit={handleSaveProject} className="p-5 space-y-4 max-h-[75vh] overflow-y-auto">
                                    
                                    {formError && (
                                        <div className="bg-red-50 text-red-600 p-3 rounded-md text-sm font-medium border border-red-200">
                                            <i data-lucide="alert-circle" className="inline w-4 h-4 mr-2 mb-0.5"></i>
                                            {formError}
                                        </div>
                                    )}

                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">Bahagian / Jabatan</label>
                                        <select className="w-full border border-gray-300 rounded-md p-2 focus:ring-2 outline-none" value={formData.Jabatan} onChange={(e) => setFormData({...formData, Jabatan: e.target.value})}>
                                            <option value="Pentadbiran">Pentadbiran</option>
                                            <option value="Akademik">Akademik</option>
                                            <option value="Hal Ehwal Siswazah">Hal Ehwal Siswazah</option>
                                        </select>
                                    </div>
                                    
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">Nama Projek</label>
                                        <input type="text" required placeholder="Cth: Sistem E-Filing Baru" className="w-full border border-gray-300 rounded-md p-2 focus:ring-2 outline-none" value={formData.Projek} onChange={(e) => setFormData({...formData, Projek: e.target.value})} />
                                    </div>

                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">Kategori Kepentingan</label>
                                        <select className="w-full border border-gray-300 rounded-md p-2 focus:ring-2 outline-none" value={formData.Kepentingan} onChange={(e) => setFormData({...formData, Kepentingan: e.target.value})}>
                                            <option value="Belum Ditetapkan">- Sila Pilih (Atau drag di luar nanti) -</option>
                                            <option value="Penting & Segera">Penting & Segera (Merah)</option>
                                            <option value="Penting & Tak Segera">Penting & Tak Segera (Biru)</option>
                                            <option value="Kurang Penting & Segera">Kurang Penting & Segera (Kuning)</option>
                                            <option value="Kurang Penting & Tak Segera">Kurang Penting & Tak Segera (Kelabu)</option>
                                        </select>
                                    </div>

                                    <div className="flex gap-4 items-center pt-2">
                                        <div className="flex-1">
                                            <label className="block text-sm font-medium text-gray-700 mb-1">Tarikh Mula</label>
                                            <input type="date" className="w-full border border-gray-300 rounded-md p-2 outline-none cursor-pointer text-sm" value={toInputDate(formData.TarikhMula)} onChange={(e) => setFormData({...formData, TarikhMula: toDisplayDate(e.target.value)})} onClick={(e) => e.target.showPicker && e.target.showPicker()} />
                                        </div>
                                        <div className="w-24">
                                            <label className="block text-sm font-medium text-gray-700 mb-1">Kemajuan</label>
                                            <div className="flex items-center gap-1 border border-gray-300 rounded-md p-2">
                                                <input type="number" min="0" max="100" required className="w-full outline-none text-center text-sm" value={formData.Kemajuan} onChange={(e) => setFormData({...formData, Kemajuan: e.target.value})} />
                                                <span className="text-gray-500 text-sm">%</span>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="flex gap-4">
                                        <div className="w-1/2">
                                            <label className="block text-sm font-medium text-gray-700 mb-1">Tarikh Siap (Dirancang)</label>
                                            <input type="date" className="w-full border border-gray-300 rounded-md p-2 outline-none text-sm cursor-pointer" value={toInputDate(formData.TarikhAsal)} onChange={(e) => setFormData({...formData, TarikhAsal: toDisplayDate(e.target.value)})} onClick={(e) => e.target.showPicker && e.target.showPicker()} />
                                        </div>
                                        <div className="w-1/2">
                                            <label className="block text-sm font-medium text-gray-700 mb-1">Tarikh Siap (Dijangka)</label>
                                            <input type="date" required={parseInt(formData.Kemajuan) === 100} className="w-full border border-gray-300 rounded-md p-2 outline-none text-sm cursor-pointer" value={toInputDate(formData.TarikhSebenar)} onChange={(e) => setFormData({...formData, TarikhSebenar: toDisplayDate(e.target.value)})} onClick={(e) => e.target.showPicker && e.target.showPicker()} />
                                        </div>
                                    </div>

                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">Catatan</label>
                                        <textarea 
                                            rows="2" 
                                            placeholder="Nota tambahan (pilihan)" 
                                            className="w-full border border-gray-300 rounded-md p-2 focus:ring-2 focus:ring-blue-500 outline-none text-sm resize-none" 
                                            value={formData.Catatan} 
                                            onChange={(e) => setFormData({...formData, Catatan: e.target.value})}
                                        ></textarea>
                                    </div>

                                    {showConfirmDelete ? (
                                        <div className="pt-2">
                                            <div className="p-4 bg-red-50 border border-red-200 rounded-lg">
                                                <p className="text-red-800 text-sm font-medium mb-3 text-center">Adakah anda pasti mahu membuang projek ini secara kekal?</p>
                                                <div className="flex gap-2">
                                                    <button type="button" onClick={() => setShowConfirmDelete(false)} disabled={isSubmitting} className="flex-1 px-3 py-2 bg-white border border-gray-300 text-gray-700 rounded-md hover:bg-gray-50 font-medium text-sm transition-colors">Batal</button>
                                                    <button 
                                                        type="button" 
                                                        onClick={executeDelete} 
                                                        disabled={isSubmitting} 
                                                        className="flex-1 px-3 py-2 bg-red-600 text-white rounded-md hover:bg-red-700 font-medium text-sm flex justify-center items-center gap-2 transition-colors"
                                                    >
                                                        {isSubmitting ? <span className="animate-spin"><i data-lucide="refresh-cw" className="w-4 h-4"></i></span> : 'Ya, Buang'}
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    ) : (
                                        <div className="pt-4 flex flex-col gap-2">
                                            <div className="flex gap-2">
                                                <button type="button" onClick={() => setShowModal(false)} className="flex-1 px-4 py-2 bg-gray-100 text-gray-700 rounded-md hover:bg-gray-200 font-medium transition-colors">Batal</button>
                                                <button 
                                                    type="submit" 
                                                    disabled={isSubmitting} 
                                                    className="flex-1 px-4 py-2 rounded-md font-medium disabled:opacity-70 flex justify-center items-center gap-2 transition-colors bg-blue-600 text-white hover:bg-blue-700"
                                                >
                                                    {isSubmitting ? <span className="animate-spin"><i data-lucide="refresh-cw" className="w-4 h-4"></i></span> : 'Simpan'}
                                                </button>
                                            </div>
                                            {isEditing && (
                                                <button 
                                                    type="button" 
                                                    onClick={() => { setShowConfirmDelete(true); }} 
                                                    disabled={isSubmitting} 
                                                    className="w-full px-4 py-2 rounded-md font-medium disabled:opacity-70 flex justify-center items-center gap-2 mt-1 transition-colors bg-red-100 text-red-600 hover:bg-red-200"
                                                >
                                                    Buang Projek
                                                </button>
                                            )}
                                        </div>
                                    )}
                                </form>
                            </div>
                        </div>
                    )}
                </>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('pps-dashboard-root'));
        root.render(<App />);
    </script>
</body>
</html>
