<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GGN Management Plan</title>
    <!-- Google Fonts & FontAwesome -->

    <style>
        #pps-dashboard-root {
            all: initial; 
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;

        }

        /* Menyembunyikan scrollbar untuk paparan kemas menu header */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Custom Scrollbar untuk Popup Tooltip */
        .popup-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .popup-scrollbar::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }
        .popup-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 10px;
        }
        .popup-scrollbar::-webkit-scrollbar-thumb:hover {

</head>
<body>

    <!-- Container di mana Dashboard akan dipaparkan -->
    <div id="pps-dashboard-root"></div>

    <!-- DATA DARI PELAYAN (GOOGLE APPS SCRIPT) -->
    <!-- Diasingkan dari Babel supaya tidak crash -->
    <script id="gas-data" type="application/json">
        {
            "userEmail": "<?= userEmail ?>",
            "adminList": <?!= adminList ?>
        }
    </script>

    <!-- Skrip Aplikasi (React & JSX) -->
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // ============================================================================
        // PAUTAN GOOGLE SHEETS & APPS SCRIPT ANDA (VERSI TERKINI)
        // ============================================================================
        const GOOGLE_SHEETS_CSV_URL = "https://docs.google.com/spreadsheets/d/1tmSzIXIfeKG9NWjqtk6fLkEuEw5X2-VPwcrOdRxakuU/gviz/tq?tqx=out:csv&gid=0"; 
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbziNruL_A5GWYr4x0bqLrkFAKLy-uCqsnl_SXvOb0CrDVP6Kit3ghQ84tXQRdxIHD5B/exec"; 

        function App() {
            // =================================================================
            // PENGURUSAN OAUTH & AKSES ADMIN (VERSI SELAMAT)
            // =================================================================
            let serverUserEmail = "pps@unisza.edu.my"; 
            let initialAdmins = ["pps@unisza.edu.my", "fathurrahman@unisza.edu.my"];
            
            try {
                const gasDataContent = document.getElementById('gas-data').textContent;
                // Semak jika ia dibuka di pelayan awan
                if (gasDataContent.indexOf("<" + "?") === -1) {
                    const parsedData = JSON.parse(gasDataContent);
                    serverUserEmail = parsedData.userEmail;
                    initialAdmins = parsedData.adminList;
                }
            } catch(e) {
                console.warn("Local Dev Mode: Menggunakan data mock.");
            }

            const currentUserEmail = serverUserEmail;
            const [adminList, setAdminList] = useState(initialAdmins);
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [userRole, setUserRole] = useState('viewer');

            // State Borang Admin
            const [showAdminModal, setShowAdminModal] = useState(false);
            const [newAdminEmail, setNewAdminEmail] = useState('');
            const [isAdminSubmitting, setIsAdminSubmitting] = useState(false);

            // Semak Akses Pengguna Secara Auto
            useEffect(() => {
                if (adminList.includes(currentUserEmail)) {
                    setIsAuthenticated(true);
                    setUserRole('admin');
                } else {
                    setIsAuthenticated(false);
                    setUserRole('viewer');
                }
            }, [adminList, currentUserEmail]);

            // =================================================================
            // STATE PROJEK & DASHBOARD
            // =================================================================
            const [toastMessage, setToastMessage] = useState(null);
            const [projects, setProjects] = useState([]);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [lastUpdated, setLastUpdated] = useState('');

            const [sortConfig, setSortConfig] = useState({ key: null, direction: 'ascending' });
            const [activeSortConfig, setActiveSortConfig] = useState('taktikal');
            const [activeMatrixSortConfig, setActiveMatrixSortConfig] = useState('taktikal');

            const [draggedItem, setDraggedItem] = useState(null);

            const [showModal, setShowModal] = useState(false);
            const [isEditing, setIsEditing] = useState(false);
            const [editOriginalName, setEditOriginalName] = useState('');
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [showConfirmDelete, setShowConfirmDelete] = useState(false);
            const [formError, setFormError] = useState('');
            
            const [formData, setFormData] = useState({
                Jabatan: 'Pentadbiran', Projek: '', TarikhMula: '', Kemajuan: '0', TarikhAsal: '', TarikhSebenar: '', Kepentingan: 'Belum Ditetapkan', Catatan: ''
            });

            const [showReportModal, setShowReportModal] = useState(false);
            const [isGeneratingReport, setIsGeneratingReport] = useState(false);
            const [reportSuccess, setReportSuccess] = useState('');
            const [reportSelections, setReportSelections] = useState({
                timeline: true, eisenhower: true, department: true, completed: true
            });

            // Sentiasa bina ikon Lucide selepas render
            useEffect(() => {
                lucide.createIcons();
            });

            // Tarik data sebaik laman web dibuka
            useEffect(() => {
                fetchProjects();
            }, []);

            const showToast = (msg) => {
                setToastMessage(msg);
                setTimeout(() => setToastMessage(null), 3500);
            };

            // =================================================================
            // FUNGSI PENGURUSAN ADMIN
            // =================================================================
            const handleAddAdmin = (e) => {
                e.preventDefault();
                const email = newAdminEmail.trim().toLowerCase();
                if (!email) return;
                
                if (adminList.includes(email)) {
                    showToast("Emel tersebut sudah berada dalam senarai Admin.");
                    return;
                }

                const updatedList = [...adminList, email];
                saveAdmins(updatedList);
            };

            const handleRemoveAdmin = (emailToRemove) => {
                const updatedList = adminList.filter(e => e !== emailToRemove);
                saveAdmins(updatedList);
            };

            const saveAdmins = (updatedList) => {
                setIsAdminSubmitting(true);
                setAdminList(updatedList); 
                setNewAdminEmail('');

                if (typeof google !== 'undefined' && google.script && google.script.run) {
                    google.script.run.withSuccessHandler(() => {
                        showToast("Senarai Admin berjaya dikemaskini.");
                        setIsAdminSubmitting(false);
                    }).saveAdminsToServer(updatedList);
                } else {
                    setTimeout(() => {
                        showToast("[Dev Mode] Senarai Admin dikemaskini.");
                        setIsAdminSubmitting(false);
                    }, 500);
                }
            };

            // =================================================================
            // FUNGSI TARIK DATA & JANA PDF
            // =================================================================
            const fetchProjects = async () => {
                setLoading(true);
                setError(null);
                try {
                    const cacheBusterUrl = `${GOOGLE_SHEETS_CSV_URL}&t=${new Date().getTime()}`;
                    
                    const response = await fetch(cacheBusterUrl);
                    
                    if (!response.ok) throw new Error("Gagal menyambung ke Google Sheets (Status: " + response.status + ")");
                    
                    const csvText = await response.text();
                    if (csvText.trim().toLowerCase().startsWith('<!doctype html>')) throw new Error("Pautan memulangkan HTML. Pastikan Sheets ditetapkan kepada 'Anyone with the link'.");
                    if (csvText.startsWith('PK')) throw new Error("Format ZIP dikesan.");

                    const parsedData = parseCSV(csvText);
                    setProjects(parsedData);
                    setLastUpdated(new Date().toLocaleTimeString('ms-MY'));
                } catch (err) {
                    console.error("Ralat Fetch CSV:", err);
                    setError("Ralat sambungan: Sila pastikan Google Sheets anda ditetapkan kepada 'Anyone with the link can view'. " + err.message);
                    setProjects([]); 
                } finally {
                    setLoading(false);
                }
            };

            const parseCSV = (text) => {
                let p = '', row = [''], ret = [row], i = 0, r = 0, s = !0, l;
                for (let l of text) {
                    if ('"' === l) {
                        if (s && l === p) row[i] += l;
                        s = !s;
                    } else if (',' === l && s) l = row[++i] = '';
                    else if ('\n' === l && s) {
                        if ('\r' === p) row[i] = row[i].slice(0, -1);
                        row = ret[++r] = [l = '']; i = 0;
                    } else row[i] += l;
                    p = l;
                }
                if (ret.length < 2) return [];
                const headers = ret[0].map(h => h.trim());
                const data = [];
                for(let j = 1; j < ret.length; j++) {
                    if(ret[j].length === 1 && ret[j][0] === '') continue; 
                    let obj = {};
                    let hasData = false;
                    for(let k = 0; k < headers.length; k++) {
                        let val = ret[j][k] !== undefined ? ret[j][k].trim() : '';
                        obj[headers[k]] = val;
                        if(val) hasData = true;
                    }
                    if(hasData && obj.Projek) data.push(obj);
                }
                return data;
            };

            const generateAndSendReport = async (e) => {
                e.preventDefault();
                if (!isAuthenticated) return;
                
                setIsGeneratingReport(true);
                setReportSuccess('');
                setError('');

                try {
                    const { jsPDF } = window.jspdf;
                    const pdf = new jsPDF('p', 'mm', 'a4');
                    const pdfWidth = pdf.internal.pageSize.getWidth();
                    const pdfHeight = pdf.internal.pageSize.getHeight();
                    let isFirstPage = true;

                    const addSectionToPdf = async (elementId) => {
                        const element = document.getElementById(elementId);
                        if (!element) return;

                        const canvas = await html2canvas(element, { scale: 2, backgroundColor: '#ffffff', useCORS: true });
                        const imgData = canvas.toDataURL('image/jpeg', 0.9);
                        const imgProps = pdf.getImageProperties(imgData);
                        const margin = 10;
                        const usableWidth = pdfWidth - (margin * 2);
                        const ratio = imgProps.width / imgProps.height;
                        let heightToFit = usableWidth / ratio;

                        if (heightToFit > (pdfHeight - (margin * 3))) {
                             heightToFit = pdfHeight - (margin * 3);
                             const widthToFit = heightToFit * ratio;
                             const xOffset = (pdfWidth - widthToFit) / 2;
                             if (!isFirstPage) pdf.addPage();
                             pdf.addImage(imgData, 'JPEG', xOffset, margin, widthToFit, heightToFit);
                        } else {
                             if (!isFirstPage) pdf.addPage();
                             pdf.addImage(imgData, 'JPEG', margin, margin, usableWidth, heightToFit);
                        }

                        pdf.setFontSize(8);
                        pdf.setTextColor(128, 128, 128);
                        pdf.text(`Laporan dijana pada: ${new Date().toLocaleString('ms-MY')}`, margin, pdfHeight - 10);
                        isFirstPage = false;
                    };

                    if (reportSelections.timeline) await addSectionToPdf('section-timeline');
                    if (reportSelections.eisenhower) await addSectionToPdf('section-eisenhower');
                    if (reportSelections.department) await addSectionToPdf('section-department');
                    if (reportSelections.completed) await addSectionToPdf('section-completed');

                    const today = new Date();
                    const dd = String(today.getDate()).padStart(2, '0');
                    const mm = String(today.getMonth() + 1).padStart(2, '0');
                    const yyyy = today.getFullYear();
                    const fileName = `LaporanStatusProjekPPS_${dd}${mm}${yyyy}.pdf`;
                    
                    pdf.save(fileName);
                    setReportSuccess(`Laporan PDF '${fileName}' berjaya dimuat turun ke peranti anda.`);
                    
                    setTimeout(() => { setShowReportModal(false); setReportSuccess(''); }, 4000);

                } catch (err) {
                    console.error("Gagal menjana laporan:", err);
                    showToast("Ralat semasa menjana laporan.");
                } finally {
                    setIsGeneratingReport(false);
                }
            };

            const openAddModal = () => {
                setIsEditing(false);
                setFormError('');
                setShowConfirmDelete(false);
                setFormData({ Jabatan: 'Pentadbiran', Projek: '', TarikhMula: '', Kemajuan: '0', TarikhAsal: '', TarikhSebenar: '', Kepentingan: 'Belum Ditetapkan', Catatan: '' });
                setShowModal(true);
            };

            const openEditModal = (project) => {
                setIsEditing(true);
                setFormError('');
                setShowConfirmDelete(false);
                setEditOriginalName(project.Projek);
                setFormData({ 
                    ...project,
                    TarikhSebenar: project.TarikhSebenar || project.TarikhAkhir || '',
                    Kepentingan: project.Kepentingan || 'Belum Ditetapkan',
                    Catatan: project.Catatan || ''
                });
                setShowModal(true);
            };

            const handleAddClick = () => openAddModal();
            const handleEditClick = (project) => openEditModal(project);

            const processDrop = async (projekName, quadrant) => {
                if (!isAuthenticated) return;

                const project = projects.find(p => p.Projek === projekName);
                if (!project || (project.Kepentingan || 'Belum Ditetapkan') === quadrant) return;

                const updatedProject = { ...project, Kepentingan: quadrant };
                setProjects(prevProjects => prevProjects.map(p => p.Projek === projekName ? updatedProject : p));

                try {
                    const payload = {
                        action: 'update',
                        oldProjek: projekName,
                        Timestamp: new Date().toLocaleString('ms-MY'),
                        ...updatedProject
                    };
                    await fetch(GOOGLE_SCRIPT_URL, {
                        method: 'POST', mode: 'no-cors',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify(payload)
                    });
                } catch (err) {
                    console.error("Gagal kemaskini matrix", err);
                }
            };

            const handleDrop = async (e, quadrant) => {
                e.preventDefault();
                if (!isAuthenticated) return;
                const projekName = e.dataTransfer.getData('text/plain');
                if (!projekName) return;
                processDrop(projekName, quadrant);
            };

            const handleSaveProject = async (e) => {
                e.preventDefault();
                if (!isAuthenticated) return;

                setIsSubmitting(true);
                setFormError('');
                
                const payload = {
                    action: isEditing ? 'update' : 'add',
                    oldProjek: isEditing ? editOriginalName : '',
                    Timestamp: new Date().toLocaleString('ms-MY'),
                    ...formData
                };

                try {
                    await fetch(GOOGLE_SCRIPT_URL, {
                        method: 'POST', mode: 'no-cors',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify(payload)
                    });
                    
                    const newData = { ...formData, Timestamp: payload.Timestamp };
                    if (isEditing) {
                        setProjects(prevProjects => prevProjects.map(p => p.Projek === editOriginalName ? newData : p));
                    } else {
                        setProjects(prevProjects => [...prevProjects, newData]);
                    }
                    
                    setShowModal(false);
                    showToast("Projek berjaya disimpan.");
                } catch (err) {
                    console.error(err);
                    setFormError("Ralat semasa menyimpan ke Google Sheets. Sila cuba lagi.");
                } finally {
                    setIsSubmitting(false);
                }
            };

            const executeDelete = async () => {
                if (!isAuthenticated) return;

                setIsSubmitting(true);
                setFormError('');
                const payload = { action: 'delete', oldProjek: editOriginalName };

                try {
                    await fetch(GOOGLE_SCRIPT_URL, {
                        method: 'POST', mode: 'no-cors',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify(payload)
                    });
                    setProjects(prevProjects => prevProjects.filter(p => p.Projek !== editOriginalName));
                    setShowModal(false);
                    showToast("Projek berjaya dibuang.");
                } catch (err) {
                    console.error(err);
                    setFormError("Ralat semasa memadam dari Google Sheets.");
                } finally {
                    setIsSubmitting(false);
                    setShowConfirmDelete(false);
                }
            };

            const handleDragStart = (e, project) => {
                e.dataTransfer.setData('text/plain', project.Projek);
                setDraggedItem(project.Projek);
            };

            const handleDragEnd = () => setDraggedItem(null);
            const handleDragOver = (e) => e.preventDefault();

            const toInputDate = (dateStr) => {
                if (!dateStr) return '';
                const parts = dateStr.split('-');
                if (parts.length === 3) {
                    if (parts[0].length === 4) return dateStr;
                    const day = parts[0].padStart(2, '0');
                    const monthStr = parts[1].toLowerCase();
                    const year = parts[2];
                    const monthMap = {'jan': '01', 'feb': '02', 'mac': '03', 'apr': '04', 'mei': '05', 'jun': '06', 'jul': '07', 'ogo': '08', 'sep': '09', 'okt': '10', 'nov': '11', 'dis': '12'};
                    const month = monthMap[monthStr] || '01';
                    return `${year}-${month}-${day}`;
                }
                return '';
            };

            const toDisplayDate = (dateStr) => {
                if (!dateStr) return '';
                const parts = dateStr.split('-');
                if (parts.length === 3) {
                    const year = parts[0];
                    const month = parts[1];
                    const day = parts[2];
                    const reverseMonthMap = {'01': 'Jan', '02': 'Feb', '03': 'Mac', '04': 'Apr', '05': 'Mei', '06': 'Jun', '07': 'Jul', '08': 'Ogo', '09': 'Sep', '10': 'Okt', '11': 'Nov', '12': 'Dis'};
                    const monthStr = reverseMonthMap[month] || 'Jan';
                    return `${day}-${monthStr}-${year}`;
                }
                return dateStr;
            };

            const checkIsOverdue = (tarikhAsal, progress) => {
                const p = parseInt(progress) || 0;
                if (p >= 100) return false;
                if (!tarikhAsal) return false;
                const parts = tarikhAsal.split('-');
                if (parts.length !== 3) return false;
                const day = parseInt(parts[0], 10);
                const monthStr = parts[1].toLowerCase();
                const year = parseInt(parts[2], 10);
                const monthMap = {'jan': 0, 'feb': 1, 'mac': 2, 'apr': 3, 'mei': 4, 'jun': 5, 'jul': 6, 'ogo': 7, 'sep': 8, 'okt': 9, 'nov': 10, 'dis': 11};
                const month = monthMap[monthStr];
                if (month === undefined) return false;
                const dueDate = new Date(year, month, day);
                const today = new Date();
                today.setHours(0,0,0,0);
                return dueDate < today;
            };

            const getBarColor = (dept, progress, isOverdue) => {
                if (isOverdue) return { bg: 'bg-red-100', fill: 'bg-red-400' };
                const p = parseInt(progress) || 0;
                if (dept === 'Pentadbiran') {
                    if (p <= 40) return { bg: 'bg-blue-100', fill: 'bg-blue-400' };
                    if (p <= 80) return { bg: 'bg-blue-200', fill: 'bg-blue-600' };
                    return { bg: 'bg-blue-200', fill: 'bg-blue-800' };
                }
                if (dept === 'Akademik') {
                    if (p <= 40) return { bg: 'bg-orange-100', fill: 'bg-orange-400' };
                    if (p <= 80) return { bg: 'bg-orange-200', fill: 'bg-orange-600' };
                    return { bg: 'bg-orange-200', fill: 'bg-orange-800' };
                }
                if (dept === 'Hal Ehwal Siswazah') {
                    if (p <= 40) return { bg: 'bg-green-100', fill: 'bg-green-400' };
                    if (p <= 80) return { bg: 'bg-green-200', fill: 'bg-green-600' };
                    return { bg: 'bg-green-200', fill: 'bg-green-800' };
                }
                return { bg: 'bg-gray-100', fill: 'bg-gray-500' };
            };

            const getDeptIcon = (dept) => {
                if (dept === 'Pentadbiran') return 'home';
                if (dept === 'Akademik') return 'feather';
                if (dept === 'Hal Ehwal Siswazah') return 'graduation-cap';
                return 'folder';
            };

            const departmentConfig = {
                'Pentadbiran': { headerBg: 'bg-blue-600' },
                'Akademik': { headerBg: 'bg-orange-600' },
                'Hal Ehwal Siswazah': { headerBg: 'bg-green-600' }
            };

            const activeProjects = projects.filter(p => parseInt(p.Kemajuan) < 100);
            const completedProjects = projects.filter(p => parseInt(p.Kemajuan) === 100);

            const parseDateForSort = (dateStr) => {
                if(!dateStr) return 0;
                const parts = dateStr.split('-');
                if(parts.length !== 3) return 0;
                const monthMap = {'jan':0,'feb':1,'mac':2,'apr':3,'mei':4,'jun':5,'jul':6,'ogo':7,'sep':8,'okt':9,'nov':10,'dis':11};
                return new Date(parts[2], monthMap[parts[1].toLowerCase()] || 0, parts[0]).getTime();
            };

            const sortedCompletedProjects = useMemo(() => {
                let sortableItems = [...completedProjects];
                if (sortConfig.key !== null) {
                    sortableItems.sort((a, b) => {
                        let valA = a[sortConfig.key] || '';
                        let valB = b[sortConfig.key] || '';
                        if (sortConfig.key === 'TarikhAsal' || sortConfig.key === 'TarikhSebenar' || sortConfig.key === 'TarikhMula') {
                            valA = parseDateForSort(valA);
                            valB = parseDateForSort(valB);
                        } else {
                            valA = valA.toString().toLowerCase();
                            valB = valB.toString().toLowerCase();
                        }
                        if (valA < valB) return sortConfig.direction === 'ascending' ? -1 : 1;
                        if (valA > valB) return sortConfig.direction === 'ascending' ? 1 : -1;
                        return 0;
                    });
                }
                return sortableItems;
            }, [completedProjects, sortConfig]);

            const requestSort = (key) => {
                let direction = 'ascending';
                if (sortConfig.key === key && sortConfig.direction === 'ascending') direction = 'descending';
                setSortConfig({ key, direction });
            };

            const renderSortIcon = (columnName) => {
                const isActive = sortConfig.key === columnName;
                const isAscending = sortConfig.direction === 'ascending';
                const baseClass = "inline ml-1.5 w-3.5 h-3.5 flex-shrink-0 transition-transform";
                if (!isActive) {
                    return <svg className={`${baseClass} text-gray-400 opacity-60`} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m21 16-4 4-4-4"/><path d="M17 20V4"/><path d="m3 8 4-4 4 4"/><path d="M7 4v16"/></svg>;
                }
                if (isAscending) {
                    return <svg className={`${baseClass} text-purple-600 font-bold`} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="m5 12 7-7 7 7"/><path d="M12 19V5"/></svg>;
                }
                return <svg className={`${baseClass} text-purple-600 font-bold`} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M12 5v14"/><path d="m19 12-7 7-7-7"/></svg>;
            };

            // =================================================================
            // FUNGSI KIRAAN PERATUSAN MASA DIGUNAKAN (DAY SPENT %)
            // =================================================================
            const getDaySpentPercentageValue = (startDateStr, plannedDateStr) => {
                const startObj = parseDateForSort(startDateStr);
                const planObj = parseDateForSort(plannedDateStr);
                if (startObj === 0 || planObj === 0) return 0;
                
                const today = new Date();
                today.setHours(0,0,0,0);
                const todayTime = today.getTime();
                
                const totalDuration = planObj - startObj;
                const elapsedDuration = todayTime - startObj;
                
                if (totalDuration <= 0) return elapsedDuration > 0 ? 9999 : 0;
                
                let percentage = (elapsedDuration / totalDuration) * 100;
                return percentage < 0 ? 0 : percentage;
            };

            const calculateDaySpentPercentage = (startDateStr, plannedDateStr) => {
                const startObj = parseDateForSort(startDateStr);
                const planObj = parseDateForSort(plannedDateStr);
                
                if (startObj === 0 || planObj === 0) return '-';
                
                const today = new Date();
                today.setHours(0,0,0,0);
                const todayTime = today.getTime();
                
                const totalDuration = planObj - startObj;
                const elapsedDuration = todayTime - startObj;
                
                if (totalDuration <= 0) return '100%';
                
                let percentage = (elapsedDuration / totalDuration) * 100;
                if (percentage < 0) percentage = 0;
                
                return Math.round(percentage) + '%';
            };

            // =================================================================
            // KOMPONEN CARTA GARIS MASA (TIMELINE)
            // =================================================================
            const ProjectTimeline = ({ activeProjects, completedProjects }) => {
                const quarters = [
                    { id: 'q1', name: "Q1", barColor: "bg-[#ffc107]", borderColor: "border-[#ffc107]", textColor: "text-[#ffc107]", months: ["Jan", "Feb", "Mac"] },
                    { id: 'q2', name: "Q2", barColor: "bg-[#29b6f6]", borderColor: "border-[#29b6f6]", textColor: "text-[#29b6f6]", months: ["Apr", "Mei", "Jun"] },
                    { id: 'q3', name: "Q3", barColor: "bg-[#ff5722]", borderColor: "border-[#ff5722]", textColor: "text-[#ff5722]", months: ["Jul", "Ogo", "Sep"] },
                    { id: 'q4', name: "Q4", barColor: "bg-[#ff4081]", borderColor: "border-[#ff4081]", textColor: "text-[#ff4081]", months: ["Okt", "Nov", "Dis"] }
                ];

                const monthMap = { 'jan': 0, 'feb': 1, 'mac': 2, 'apr': 3, 'mei': 4, 'jun': 5, 'jul': 6, 'ogo': 7, 'sep': 8, 'okt': 9, 'nov': 10, 'dis': 11 };
                
                const activeByMonth = Array(12).fill().map(() => []);
                const completedByMonth = Array(12).fill().map(() => []);

                const [hoveredId, setHoveredId] = useState(null);
                const [pinnedId, setPinnedId] = useState(null);

                useEffect(() => {
                    const handleGlobalClick = (e) => {
                        if (!e.target.closest('.timeline-node-container')) {
                            setPinnedId(null);
                        }
                    };
                    document.addEventListener('mousedown', handleGlobalClick);
                    return () => document.removeEventListener('mousedown', handleGlobalClick);
                }, []);

                const handleNodeEnter = (nodeId) => {
                    setHoveredId(nodeId);
                    if (pinnedId && pinnedId !== nodeId) setPinnedId(null);
                };

                const handleNodeLeave = () => setHoveredId(null);

                const handleNodeClick = (nodeId) => {
                    setPinnedId(pinnedId === nodeId ? null : nodeId);
                };

                activeProjects.forEach(p => {
                    const dateStr = p.TarikhAsal; 
                    if (dateStr) {
                        const parts = dateStr.split('-');
                        if (parts.length === 3) {
                            const mIndex = monthMap[parts[1].toLowerCase()];
                            if (mIndex !== undefined) activeByMonth[mIndex].push(p);
                        }
                    }
                });

                completedProjects.forEach(p => {
                    const dateStr = p.TarikhSebenar || p.TarikhAsal; 
                    if (dateStr) {
                        const parts = dateStr.split('-');
                        if (parts.length === 3) {
                            const mIndex = monthMap[parts[1].toLowerCase()];
                            if (mIndex !== undefined) completedByMonth[mIndex].push(p);
                        }
                    }
                });

                const timelineData = quarters.map((q, qIndex) => {
                    return {
                        ...q,
                        monthsData: q.months.map((mName, i) => {
                            const absMonthIndex = (qIndex * 3) + i;
                            return { name: mName, active: activeByMonth[absMonthIndex], completed: completedByMonth[absMonthIndex] };
                        })
                    };
                });

                return (
                    <div id="section-timeline" className="bg-white rounded-xl shadow-sm border border-gray-200 p-5 overflow-hidden scroll-mt-20">
                        <div className="mb-6">
                            <h2 className="text-xl font-bold text-gray-800 flex items-center gap-2">
                                <i data-lucide="calendar-days" className="w-5 h-5 text-blue-600"></i> Carta Sukuan Tahun
                            </h2>
                            <p className="text-sm text-gray-500 mt-1">
                                Garis masa paparan projek mengikut bulan. Nombor berwarna mewakili sasaran, nombor kelabu mewakili projek siap.<br/>
                                Klik pada nombor untuk mengekalkan popup terbuka supaya anda boleh scroll senarai.
                            </p>
                        </div>
                        
                        <div className="w-full pb-36 pt-16">
                            <div className="w-full px-2 sm:px-4">
                                <div className="relative flex w-full bg-gray-100 p-2 rounded-full shadow-inner">
                                    {timelineData.map((q, qIndex) => (
                                        <div 
                                            key={q.id} 
                                            className={`flex-1 flex justify-around items-center h-16 ${q.barColor} ${qIndex === 0 ? 'rounded-l-full' : ''} ${qIndex === timelineData.length - 1 ? 'rounded-r-full' : ''} border-r-2 border-white/30 last:border-r-0 relative`}
                                        >
                                            <div className="absolute -top-16 left-1/2 -translate-x-1/2 flex flex-col items-center z-10">
                                                <div className={`border-[3px] ${q.borderColor} bg-white px-5 py-1 rounded-xl font-bold text-gray-600 shadow-sm min-w-[70px] text-center text-sm`}>
                                                    {q.name}
                                                </div>
                                                <svg className={`w-4 h-5 ${q.textColor} mt-1`} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                                                    <line x1="12" y1="19" x2="12" y2="5"></line>
                                                    <polyline points="5 12 12 5 19 12"></polyline>
                                                </svg>
                                            </div>

                                            {q.monthsData.map((m, mIndex) => {
                                                const activeNodeId = `active-${qIndex}-${mIndex}`;
                                                const completedNodeId = `completed-${qIndex}-${mIndex}`;
                                                const isActiveVisible = hoveredId === activeNodeId || pinnedId === activeNodeId;
                                                const isCompletedVisible = hoveredId === completedNodeId || pinnedId === completedNodeId;

                                                return (
                                                    <div key={mIndex} className="relative flex flex-col items-center">
                                                        <div className="w-10 h-10 bg-white rounded-full flex items-center justify-center font-bold text-xs text-gray-500 shadow-sm z-20">
                                                            {m.name}
                                                        </div>

                                                        {(m.active.length > 0 || m.completed.length > 0) && (
                                                            <div className="absolute top-10 flex flex-col items-center z-30">
                                                                <div className={`w-0.5 bg-gray-300 relative transition-colors ${m.active.length > 0 ? 'h-10' : 'h-[5.5rem]'}`}>
                                                                    <div className="absolute top-1/2 -translate-y-1/2 left-1/2 -translate-x-1/2 w-2 h-4 bg-gray-50 border border-gray-300 rounded-full"></div>
                                                                </div>
                                                                
                                                                {m.active.length > 0 && (
                                                                    <div 
                                                                        className="relative cursor-pointer flex flex-col items-center timeline-node-container"
                                                                        onMouseEnter={() => handleNodeEnter(activeNodeId)}
                                                                        onMouseLeave={handleNodeLeave}
                                                                        onClick={() => handleNodeClick(activeNodeId)}
                                                                    >
                                                                        <div className={`w-10 h-10 ${q.barColor} rounded-full border-[3px] border-white shadow-md flex items-center justify-center text-white font-bold text-xs transition-transform duration-300 ${isActiveVisible ? 'scale-110 shadow-lg' : 'hover:scale-110'}`}>
                                                                            {m.active.length < 10 ? `0${m.active.length}` : m.active.length}
                                                                        </div>

                                                                        <div 
                                                                            className={`absolute top-full mt-2 w-64 bg-gray-800 text-white rounded-xl p-4 transition-all duration-200 shadow-xl z-50 cursor-default ${isActiveVisible ? 'opacity-100 visible translate-y-0' : 'opacity-0 invisible translate-y-2 pointer-events-none'}`}
                                                                            onClick={(e) => e.stopPropagation()} 
                                                                        >
                                                                            <div className="text-gray-300 text-xs font-bold mb-2 uppercase tracking-wider border-b border-gray-600 pb-1.5 flex items-center gap-1.5">
                                                                                <svg className="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                                                                                {m.active.length} Sasaran Projek ({m.name} {q.name})
                                                                            </div>
                                                                            <ul className="text-left space-y-2.5 mt-2 max-h-48 overflow-y-auto pr-2 popup-scrollbar">
                                                                                {m.active.map((p, idx) => (
                                                                                    <li key={idx} className="text-sm font-medium leading-snug flex items-start gap-2.5">
                                                                                        <span className={`w-2 h-2 rounded-full mt-1.5 flex-shrink-0 ${q.barColor}`}></span>
                                                                                        <span className="break-words">{p.Projek}</span>
                                                                                    </li>
                                                                                ))}
                                                                            </ul>
                                                                            <div className="absolute -top-2 left-1/2 -translate-x-1/2 border-[8px] border-transparent border-b-gray-800"></div>
                                                                        </div>
                                                                    </div>
                                                                )}

                                                                {m.active.length > 0 && m.completed.length > 0 && (
                                                                    <div className="h-4 w-0.5 bg-gray-300"></div>
                                                                )}

                                                                {m.completed.length > 0 && (
                                                                    <div 
                                                                        className="relative cursor-pointer flex flex-col items-center timeline-node-container"
                                                                        onMouseEnter={() => handleNodeEnter(completedNodeId)}
                                                                        onMouseLeave={handleNodeLeave}
                                                                        onClick={() => handleNodeClick(completedNodeId)}
                                                                    >
                                                                        <div className={`w-10 h-10 bg-gray-400 rounded-full border-[3px] border-white shadow-md flex items-center justify-center text-white font-bold text-xs transition-transform duration-300 ${isCompletedVisible ? 'scale-110 shadow-lg' : 'hover:scale-110'}`}>
                                                                            {m.completed.length < 10 ? `0${m.completed.length}` : m.completed.length}
                                                                        </div>

                                                                        <div 
                                                                            className={`absolute top-full mt-2 w-64 bg-gray-800 text-white rounded-xl p-4 transition-all duration-200 shadow-xl z-50 cursor-default ${isCompletedVisible ? 'opacity-100 visible translate-y-0' : 'opacity-0 invisible translate-y-2 pointer-events-none'}`}
                                                                            onClick={(e) => e.stopPropagation()}
                                                                        >
                                                                            <div className="text-gray-300 text-xs font-bold mb-2 uppercase tracking-wider border-b border-gray-600 pb-1.5 flex items-center gap-1.5">
                                                                                <svg className="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                                                                                {m.completed.length} Projek Siap ({m.name} {q.name})
                                                                            </div>
                                                                            <ul className="text-left space-y-2.5 mt-2 max-h-48 overflow-y-auto pr-2 popup-scrollbar">
                                                                                {m.completed.map((p, idx) => (
                                                                                    <li key={idx} className="text-sm font-medium leading-snug flex items-start gap-2.5">
                                                                                        <span className="w-2 h-2 rounded-full mt-1.5 flex-shrink-0 bg-gray-400"></span>
                                                                                        <span className="break-words">{p.Projek}</span>
                                                                                    </li>
                                                                                ))}
                                                                            </ul>
                                                                            <div className="absolute -top-2 left-1/2 -translate-x-1/2 border-[8px] border-transparent border-b-gray-800"></div>
                                                                        </div>
                                                                    </div>
                                                                )}
                                                            </div>
                                                        )}
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>

                        {/* JADUAL RINGKASAN SUKU TAHUN (Q1 - Q4) UNTUK LAPORAN PDF */}
                        <div className="mt-8 border border-gray-200 rounded-xl overflow-hidden bg-white shadow-sm">
                            <table className="w-full text-sm text-left text-gray-600 table-fixed">
                                <thead className="bg-gray-50 border-b border-gray-200">
                                    <tr>
                                        <th className="w-32 px-4 py-3 font-bold text-gray-700 border-r border-gray-200 text-center">Status</th>
                                        {timelineData.map(q => (
                                            <th key={q.id} className="px-4 py-3 text-center border-r border-gray-200 last:border-r-0">
                                                <span className={`px-3 py-1 rounded-full text-white text-xs font-bold ${q.barColor}`}>{q.name}</span>
                                            </th>
                                        ))}
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-gray-200">
                                    {/* Baris Aktif */}
                                    <tr className="hover:bg-gray-50/50 transition-colors">
                                        <td className="px-4 py-4 font-semibold text-blue-700 border-r border-gray-200 bg-blue-50/30 align-top text-center">
                                            <div className="flex flex-col items-center gap-1.5">
                                                <i data-lucide="target" className="w-5 h-5"></i>
                                                <span className="text-xs uppercase tracking-wide">Sasaran<br/>Aktif</span>
                                            </div>
                                        </td>
                                        {timelineData.map(q => {
                                            const qActive = q.monthsData.reduce((acc, m) => acc.concat(m.active), []);
                                            return (
                                                <td key={q.id} className="px-4 py-3 border-r border-gray-200 last:border-r-0 align-top">
                                                    {qActive.length > 0 ? (
                                                        <ul className="space-y-1.5">
                                                            {qActive.map((p, idx) => (
                                                                <li key={idx} className="flex items-start gap-2">
                                                                    <span className={`w-1.5 h-1.5 rounded-full mt-1.5 flex-shrink-0 ${q.barColor}`}></span>
                                                                    <span className="text-xs font-medium text-gray-700 leading-snug">{p.Projek}</span>
                                                                </li>
                                                            ))}
                                                        </ul>
                                                    ) : (
                                                        <span className="text-gray-400 italic text-xs block text-center mt-2">- Tiada -</span>
                                                    )}
                                                </td>
                                            );
                                        })}
                                    </tr>
                                    
                                    {/* Baris Siap */}
                                    <tr className="hover:bg-gray-50/50 transition-colors">
                                        <td className="px-4 py-4 font-semibold text-gray-600 border-r border-gray-200 bg-gray-100/50 align-top text-center">
                                            <div className="flex flex-col items-center gap-1.5">
                                                <i data-lucide="check-circle" className="w-5 h-5"></i>
                                                <span className="text-xs uppercase tracking-wide">Telah<br/>Siap</span>
                                            </div>
                                        </td>
                                        {timelineData.map(q => {
                                            const qCompleted = q.monthsData.reduce((acc, m) => acc.concat(m.completed), []);
                                            return (
                                                <td key={q.id} className="px-4 py-3 border-r border-gray-200 last:border-r-0 align-top">
                                                    {qCompleted.length > 0 ? (
                                                        <ul className="space-y-1.5">
                                                            {qCompleted.map((p, idx) => (
                                                                <li key={idx} className="flex items-start gap-2">
                                                                    <span className="w-1.5 h-1.5 rounded-full mt-1.5 flex-shrink-0 bg-gray-400"></span>
                                                                    <span className="text-xs font-medium text-gray-700 leading-snug">{p.Projek}</span>
                                                                </li>
                                                            ))}
                                                        </ul>
                                                    ) : (
                                                        <span className="text-gray-400 italic text-xs block text-center mt-2">- Tiada -</span>
                                                    )}
                                                </td>
                                            );
                                        })}
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                );
            };

            const ProjectBar = ({ project, isDraggable = true }) => {
                const progress = parseInt(project.Kemajuan) || 0;
                const isCompleted = progress === 100;
                const isOverdue = checkIsOverdue(project.TarikhAsal, progress);
                const colors = getBarColor(project.Jabatan, progress, isOverdue);

                return (
                    <div 
                        draggable={!isCompleted && isAuthenticated}
                        onDragStart={(e) => handleDragStart(e, project)}
                        onDragEnd={handleDragEnd}
                        onClick={() => { if(isAuthenticated) handleEditClick(project) }} 
                        className={`relative w-full ${colors.bg} rounded-lg h-16 mb-3 border border-black/5 shadow-sm group hover:shadow-md hover:ring-2 hover:ring-blue-300 transition-all ${!isCompleted && isAuthenticated ? 'cursor-pointer active:cursor-grabbing hover:cursor-grab' : 'cursor-default'} ${draggedItem === project.Projek ? 'opacity-50 scale-95' : 'opacity-100'}`}
                    >
                        <div className="absolute inset-0 rounded-lg overflow-hidden pointer-events-none">
                            <div 
                                className={`absolute top-0 left-0 h-full ${colors.fill} transition-all duration-1000 ease-out`} 
                                style={{ width: `${progress}%` }}
                            ></div>
                        </div>
                        
                        <div className="absolute top-0 left-0 w-full h-full flex justify-between items-center px-3 z-10 text-gray-800">
                            <div className="flex items-center gap-3 w-[65%] bg-white/70 backdrop-blur-[2px] px-2 py-1.5 rounded-md shadow-sm border border-white/20">
                                {isCompleted ? <i data-lucide="check-circle-2" className="text-green-700 w-4 h-4 min-w-max"></i> : (isOverdue ? <i data-lucide="alert-circle" className="text-red-600 w-4 h-4 min-w-max"></i> : <i data-lucide="grip-vertical" className="text-gray-400 w-4 h-4 min-w-max"></i>)}
                                
                                <div className="flex flex-col w-full">
                                    <div className="flex items-center gap-1.5">
                                        <i data-lucide={getDeptIcon(project.Jabatan)} className={`w-4 h-4 flex-shrink-0 opacity-90 ${isOverdue ? 'text-red-700' : (project.Jabatan === 'Pentadbiran' ? 'text-blue-700' : project.Jabatan === 'Akademik' ? 'text-orange-700' : 'text-green-700')}`} title={project.Jabatan}></i>
                                        <span className={`font-semibold text-sm truncate ${isOverdue ? 'text-red-800' : 'text-gray-800'}`}>
                                            {project.Projek}
                                        </span>
                                        {project.Catatan && (
                                            <div className="relative group/tooltip flex items-center">
                                                <svg className="w-4 h-4 text-purple-500 opacity-80 flex-shrink-0 cursor-help" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                                                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/><path d="M9 9h6"/><path d="M9 13h6"/>
                                                </svg>
                                                <div className="absolute left-full ml-2 top-1/2 -translate-y-1/2 w-64 md:w-72 bg-gray-700 text-white rounded-md p-3 opacity-0 invisible group-hover/tooltip:opacity-100 group-hover/tooltip:visible transition-all duration-200 z-[999] shadow-xl font-normal text-xs whitespace-normal break-words leading-relaxed pointer-events-none">
                                                    <span className="text-gray-300 font-semibold block mb-0.5">Catatan:</span>
                                                    {project.Catatan}
                                                    <div className="absolute top-1/2 -left-1.5 -translate-y-1/2 border-[6px] border-transparent border-r-gray-700"></div>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                    <span className="text-[10px] text-gray-500 font-medium hidden md:block mt-0.5">
                                        Dirancang: {project.TarikhAsal || 'Tiada'} | Dijangka: {project.TarikhSebenar || project.TarikhAkhir || 'Tiada'}
                                    </span>
                                </div>
                            </div>
                            
                            <div className="flex items-center gap-2">
                                <div className="relative group/progress">
                                    <span className={`text-xs font-bold bg-white/80 backdrop-blur-[2px] px-2 py-1.5 rounded-md shadow-sm border border-white/20 cursor-help ${isOverdue ? 'text-red-700' : 'text-gray-800'}`}>
                                        {progress}%
                                    </span>
                                    <div className="absolute bottom-full left-1/2 -translate-x-1/2 mb-1 bg-gray-800 text-white text-[10px] rounded px-2 py-1 opacity-0 group-hover/progress:opacity-100 transition-opacity whitespace-nowrap pointer-events-none">
                                        Peratus Kemajuan
                                    </div>
                                </div>
                                <div className="relative group/time">
                                    <span className={`flex items-center gap-1.5 text-xs font-medium bg-white/80 backdrop-blur-[2px] px-2 py-1.5 rounded-md shadow-sm whitespace-nowrap border border-white/20 hidden sm:flex cursor-help ${isOverdue ? 'text-red-700' : 'text-gray-800'}`}>
                                        <i data-lucide="clock" className="w-3 h-3"></i>
                                        {calculateDaySpentPercentage(project.TarikhMula, project.TarikhAsal)}
                                    </span>
                                    <div className="absolute bottom-full left-1/2 -translate-x-1/2 mb-1 bg-gray-800 text-white text-[10px] rounded px-2 py-1 opacity-0 group-hover/time:opacity-100 transition-opacity whitespace-nowrap pointer-events-none">
                                        Peratus Masa
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            };

            const QuadrantBox = ({ title, category, icon, bgColor, borderColor, titleColor }) => {
                const [isDragOver, setIsDragOver] = useState(false);
                let qProjects = activeProjects.filter(p => (p.Kepentingan || 'Belum Ditetapkan') === category);

                qProjects.sort((a, b) => {
                    if (activeMatrixSortConfig === 'taktikal') {
                        const isOverdueA = checkIsOverdue(a.TarikhAsal, a.Kemajuan);
                        const isOverdueB = checkIsOverdue(b.TarikhAsal, b.Kemajuan);
                        
                        if (isOverdueA && !isOverdueB) return -1;
                        if (!isOverdueA && isOverdueB) return 1;
                        
                        if (isOverdueA && isOverdueB) {
                            const daySpentA = getDaySpentPercentageValue(a.TarikhMula, a.TarikhAsal);
                            const daySpentB = getDaySpentPercentageValue(b.TarikhMula, b.TarikhAsal);
                            return daySpentB - daySpentA;
                        }
                        
                        return (parseInt(b.Kemajuan) || 0) - (parseInt(a.Kemajuan) || 0);
                    } else if (activeMatrixSortConfig === 'prog_desc') {
                        return (parseInt(b.Kemajuan) || 0) - (parseInt(a.Kemajuan) || 0);
                    } else if (activeMatrixSortConfig === 'prog_asc') {
                        return (parseInt(a.Kemajuan) || 0) - (parseInt(b.Kemajuan) || 0);
                    } else if (activeMatrixSortConfig === 'date_asc') {
                        const dateA = parseDateForSort(a.TarikhAsal);
                        const dateB = parseDateForSort(b.TarikhAsal);
                        if (dateA === 0 && dateB === 0) return 0;
                        if (dateA === 0) return 1; 
                        if (dateB === 0) return -1;
                        return dateA - dateB;
                    }
                    return 0;
                });

                return (
                    <div 
                        onDragOver={(e) => { 
                            if (!isAuthenticated) return;
                            handleDragOver(e);
